    <rect x="34" y="52" width="3" height="126" rx="1.5" fill="url(#accentV)"/><text x="58" y="68" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" fill="#0B1220">I build high-performance systems at the intersection of</text><text x="58" y="102" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" fill="#0B1220">distributed infrastructure, storage, and applied ML.</text><text x="58" y="136" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" fill="#0B1220">I care about throughput, latency, and systems</text><text x="58" y="170" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="22" fill="#0B1220">that hold up under real load.</text><rect x="762" y="44" width="1" height="134" fill="#0F172A" fill-opacity="0.1"/><text x="800" y="64" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="14" font-weight="600" letter-spacing="2.4" fill="#2563EB" opacity="0.9">EDUCATION</text><text x="800" y="102" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="19" font-weight="700" fill="#0B1220">M.C.S. — University of Illinois</text><text x="800" y="124" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="15" fill="#54637E">Networks &amp; Distributed Systems</text><text x="800" y="158" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="19" font-weight="700" fill="#0B1220">M.S. Financial Mathematics</text><text x="800" y="180" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="15" fill="#54637E">Johns Hopkins &#183; from Jan 2027</text>
