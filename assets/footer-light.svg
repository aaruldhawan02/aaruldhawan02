<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="88" viewBox="0 0 1200 88" role="img" aria-label="">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCFDFF"/>
      <stop offset="1" stop-color="#E9EFFA"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2563EB" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#0F172A" opacity="0.07"/>
    </pattern>
    <clipPath id="round"><rect width="1200" height="88" rx="18"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="1200" height="88" fill="url(#bg)"/>
    <rect width="1200" height="88" fill="url(#dots)" opacity="0.7"/>
    <rect x="300" y="33" width="600" height="1.5" fill="url(#hair)"/>
    <circle cx="600" cy="34" r="14" fill="#E9EFFA"/>
    <circle cx="600" cy="34" r="10" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.45"/>
    <circle cx="600" cy="34" r="3.5" fill="#2563EB">
      <animate attributeName="opacity" values="1;0.35;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <text x="600" y="65" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace" font-size="11"
          font-weight="500" letter-spacing="2.2" fill="#54637E" opacity="0.85">SYSTEMS  &#183;  DISTRIBUTED INFRASTRUCTURE  &#183;  APPLIED ML</text>
  </g>
  <rect x="0.5" y="0.5" width="1199" height="87" rx="17.5" fill="none"
        stroke="#0F172A" stroke-opacity="0.1"/>
</svg>
